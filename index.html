<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Utils</title>
  <meta name="description" content="Calculate dates and durations directly in your browser. Add or subtract days, count days between two dates." />
  <meta property="og:title"       content="Date Utils" />
  <meta property="og:description" content="Add days to a date, or count days between two dates." />
  <meta property="og:type"        content="website" />
  <link rel="stylesheet" href="assets/css/tailwind.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script defer src="assets/js/alpine.min.js"></script>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0f0f" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png" />
</head>
<body
  class="font-mono text-[13px] min-h-screen"
  x-data="dateApp()"
  x-cloak
>
  <div class="max-w-lg mx-auto px-4 py-12">
    <div class="mb-8">
      <div class="flex items-center justify-between mb-1">
        <div class="flex items-center gap-2.5">
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
            <circle cx="8"  cy="15" r="1" fill="currentColor"/>
            <circle cx="12" cy="15" r="1" fill="currentColor"/>
            <circle cx="16" cy="15" r="1" fill="currentColor"/>
          </svg>
          <span class="text-lg font-medium tracking-tight" x-text="t.appName"></span>
        </div>
        <button
          @click="toggleLang()"
          class="btn-secondary text-[11px] px-2.5 py-1 rounded-md"
          x-text="lang === 'it' ? 'EN' : 'IT'"
          title="Switch language"
        ></button>
      </div>
    </div>
    <div class="tab-bar flex gap-1 mb-6 p-1 rounded-xl">
      <button
        @click="switchTab('addDays')"
        class="tab-btn flex-1 h-9 rounded-lg text-[12px] font-medium"
        :class="tab === 'addDays' ? 'active' : ''"
        x-text="t.tabAddDays"
      ></button>
      <button
        @click="switchTab('countDays')"
        class="tab-btn flex-1 h-9 rounded-lg text-[12px] font-medium"
        :class="tab === 'countDays' ? 'active' : ''"
        x-text="t.tabCountDays"
      ></button>
    </div>
    <div x-show="tab === 'addDays'"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 translate-x-2"
         x-transition:enter-end="opacity-100 translate-x-0"
    >
      <p class="text-[12px] text-muted mb-4" x-text="t.descAddDays"></p>
      <div class="card mb-4">
        <label class="label mb-1.5" x-text="t.labelDate"></label>
        <input
          type="date"
          x-model="addDate"
          class="field w-full h-10 rounded-lg px-3"
        />
        <label class="label mb-1.5 mt-4" x-text="t.labelDays"></label>
        <input
          type="number"
          x-model="addDays"
          min="1"
          max="9999"
          placeholder="1 – 9999"
          class="field w-full h-10 rounded-lg px-3"
        />        
        <div class="flex gap-4 mt-4">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="radio" x-model="addMode" value="add"
              class="w-4 h-4 accent-ink dark:accent-snow" />
            <span class="text-[13px]" x-text="t.radioAdd"></span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="radio" x-model="addMode" value="subtract"
              class="w-4 h-4 accent-ink dark:accent-snow" />
            <span class="text-[13px]" x-text="t.radioSubtract"></span>
          </label>
        </div>
        <div class="flex gap-2 mt-4">
          <button
            @click="calculateDate()"
            class="btn-primary h-10 px-5 rounded-lg font-medium"
            x-text="t.btnCalculate"
          ></button>
          <button
            @click="clearAll()"
            class="btn-secondary h-10 px-5 rounded-lg"
            x-text="t.btnClear"
          ></button>
        </div>
      </div>
      <div
        x-show="addError"
        x-transition
        class="output-error rounded-xl border px-4 py-3 mb-4"
      >
        <p class="text-[12px] output-error-text" x-text="addError"></p>
      </div>
      <div
        x-show="addResult !== null"
        x-transition:enter="transition ease-out duration-150"
        x-transition:enter-start="opacity-0 -translate-y-1"
        x-transition:enter-end="opacity-100 translate-y-0"
        class="output-success rounded-xl border p-4"
      >
        <p class="text-[10px] uppercase tracking-widest font-medium output-success-label mb-2" x-text="t.resultDate"></p>
        <p class="text-[18px] font-medium tracking-tight" x-text="addResult"></p>
      </div>
    </div>
    <div x-show="tab === 'countDays'"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 translate-x-2"
         x-transition:enter-end="opacity-100 translate-x-0"
    >
      <p class="text-[12px] text-muted mb-4" x-text="t.descCountDays"></p>
      <div class="card mb-4">
        <label class="label mb-1.5" x-text="t.labelStartDate"></label>
        <input
          type="date"
          x-model="startDate"
          class="field w-full h-10 rounded-lg px-3"
        />        
        <label class="label mb-1.5 mt-4" x-text="t.labelEndDate"></label>
        <input
          type="date"
          x-model="endDate"
          class="field w-full h-10 rounded-lg px-3"
        />
        <div class="flex gap-2 mt-4">
          <button
            @click="calculateDuration()"
            class="btn-primary h-10 px-5 rounded-lg font-medium"
            x-text="t.btnCalculate"
          ></button>
          <button
            @click="clearAll()"
            class="btn-secondary h-10 px-5 rounded-lg"
            x-text="t.btnClear"
          ></button>
        </div>
      </div>
      <div
        x-show="countError"
        x-transition
        class="output-error rounded-xl border px-4 py-3 mb-4"
      >
        <p class="text-[12px] output-error-text" x-text="countError"></p>
      </div>
      <div
        x-show="countResult !== null"
        x-transition:enter="transition ease-out duration-150"
        x-transition:enter-start="opacity-0 -translate-y-1"
        x-transition:enter-end="opacity-100 translate-y-0"
        class="output-success rounded-xl border p-4"
      >
        <div class="grid grid-cols-3 gap-3">
          <div class="text-center">
            <p class="text-[10px] uppercase tracking-widest output-success-label mb-1" x-text="t.resultYears"></p>
            <p class="text-[24px] font-medium" x-text="countResult?.years"></p>
          </div>
          <div class="text-center border-x output-success-divider">
            <p class="text-[10px] uppercase tracking-widest output-success-label mb-1" x-text="t.resultMonths"></p>
            <p class="text-[24px] font-medium" x-text="countResult?.months"></p>
          </div>
          <div class="text-center">
            <p class="text-[10px] uppercase tracking-widest output-success-label mb-1" x-text="t.resultDays"></p>
            <p class="text-[24px] font-medium" x-text="countResult?.days"></p>
          </div>
        </div>
      </div>
    </div>
    <div class="divider pt-5 mt-8 flex items-center justify-center text-[11px] text-muted" style="opacity:0.7">
      <span>
        <span x-text="t.madeWith"></span>
        <a href="https://claude.ai" target="_blank" rel="noopener" class="footer-link">Claude</a>
        (Anthropic)
      </span>
    </div>
  </div>
  <script src="assets/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/date-utils/sw.js');
    }
  </script>
</body>
</html>
